#
# Voboost configuration file.
#
# Flat schema: every key maps directly to a field on the Config model
# (see voboost-config Config.kt). Field names use kebab-case in YAML and
# map to camelCase Kotlin properties (e.g. settings-language -> settingsLanguage).
#
# All fields are optional; missing values are left null and the application
# falls back to its own defaults.
#

# Application display language. Free-form string, typically "en" or "ru".
settings-language: en

# Application theme. Free-form string, e.g. "free-dark" or "free-light".
settings-theme: free-dark

# Horizontal interface positioning adjustment in pixels.
settings-interface-shift-x: 0

# Vertical interface positioning adjustment in pixels.
settings-interface-shift-y: 0

# Tab that is active when the application starts.
# Options: store | applications | interface | vehicle | settings
settings-active-tab: interface

# Vehicle fuel/energy management mode.
# Options: electric | electric_forced | hybrid | save
vehicle-fuel-mode: electric

# Vehicle driving behavior mode.
# Options: eco | comfort | sport | snow | outing | individual
vehicle-drive-mode: comfort

# Russian keyboard feature setting. Free-form string, e.g. "enable-russian".
interface-keyboard: enable-russian

# Weather widget feature setting. Free-form string, e.g. "enable-non-chineese-cities".
interface-widget-weather: enable-non-chineese-cities

# Application startup behavior mode.
# Options: off | hidden | interface
settings-startup: off

# Vehicle model type.
# Options: free | dreamer
settings-car-model: free

# Pedestrian warning sound behavior.
# Options: original | off
vehicle-pedestrian-warning: original
